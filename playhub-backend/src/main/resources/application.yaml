spring:
  application:
    name: playhub-backend

  profiles:
    active: ${PROFILE:dev}

  servlet:
    multipart:
      enabled: true # If false, MultipartFile will not available
      max-file-size: 10MB
      max-request-size: 10MB
      file-size-threshold: 2KB  # Store in memory (RAM) <= 2KB and upload to disk if exceeded

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    protocol: SMTP
    properties:
      mail:
        SMTP:
          auth: true
          STARTTLS:
            enable: true
          ssl:
            trust: smtp.gmail.com

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

app:
  jwt:
    signer-key: ${JWT_SIGNER_KEY}
    access-expiration: 900000   # 15 minutes
    refresh-expiration: 604800000   # 7 days

  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}

  async:
    email:
      core-pool-size: 5
      max-pool-size: 20
      queue-capacity: 100
      keep-alive-seconds: 60